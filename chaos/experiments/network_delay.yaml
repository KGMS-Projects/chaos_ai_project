apiVersion: chaos-mesh.org/v1alpha1
kind: NetworkChaos
metadata:
  name: network-delay-experiment
  namespace: default
spec:
  action: delay
  mode: one
  duration: "60s"
  selector:
    namespaces:
      - default
    labelSelectors:
      app: frontend         # overwritten at runtime by chaos_client.py
  delay:
    latency: "500ms"
    correlation: "25"
    jitter: "100ms"
