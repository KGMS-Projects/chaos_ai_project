apiVersion: chaos-mesh.org/v1alpha1
kind: PodChaos
metadata:
  name: pod-kill-experiment
  namespace: default
spec:
  action: pod-kill
  mode: one
  duration: "30s"
  selector:
    namespaces:
      - default
    labelSelectors:
      app: cartservice      # overwritten at runtime by chaos_client.py
